<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMRW Portal Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:#f4f5f7;color:#0f172a;min-height:100vh}
.pw-gate{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999}
.pw-box{text-align:center;color:#fff;width:320px}
.pw-box .pw-logo{font-size:20px;font-weight:800;margin-bottom:4px}
.pw-box .pw-sub{font-size:11px;color:#64748b;margin-bottom:28px}
.pw-box input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#fff;font-family:'Outfit',system-ui,sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.pw-box input::placeholder{color:#475569}
.pw-box input:focus{border-color:#3b82f6}
.pw-box button{width:100%;padding:12px;border-radius:8px;border:none;background:#fff;color:#0f172a;font-family:'Outfit',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.pw-box button:hover{background:#e2e8f0}
.pw-err{color:#f87171;font-size:11px;margin-top:8px;display:none}
.hidden{display:none!important}
header{background:#0f172a;color:#fff;padding:0 20px;display:flex;align-items:center;height:48px;position:sticky;top:0;z-index:100;gap:16px}
header .logo{font-size:14px;font-weight:800;white-space:nowrap}
.nav{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav a{padding:6px 12px;font-size:11px;font-weight:600;color:#94a3b8;cursor:pointer;border-radius:6px;white-space:nowrap;transition:all .15s}
.nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav a.act{color:#fff;background:rgba(255,255,255,.12)}
.dl-btn{padding:6px 14px;font-size:10px;font-weight:700;background:#fff;color:#0f172a;border:none;border-radius:6px;cursor:pointer;white-space:nowrap}
.dl-btn:hover{background:#e2e8f0}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:14px;text-align:center}
.card .n{font-size:24px;font-weight:700}
.card .l{font-size:10px;color:#94a3b8;margin-top:3px;text-transform:uppercase;font-weight:600}
.section{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:14px}
.section h3{font-size:13px;font-weight:700;margin-bottom:10px}
.section h4{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin:12px 0 6px}
.pill{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600}
.s-live,.s-l{background:#ecfdf5;color:#065f46}
.s-approved,.s-a{background:#eff6ff;color:#1e40af}
.s-blocked,.s-b{background:#fef2f2;color:#991b1b}
.s-planned,.s-p,.s-todo,.s-t{background:#f5f3ff;color:#4338ca}
.s-review,.s-r{background:#fefce8;color:#854d0e}
.s-stopped,.s-s{background:#f1f5f9;color:#64748b}
.s-critical{background:#fef2f2;color:#991b1b}
.s-high{background:#fefce8;color:#854d0e}
.s-medium{background:#eff6ff;color:#1e40af}
.item{padding:8px 10px;border-radius:6px;font-size:12px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.item:hover{background:#fafbfc}
.item .title{flex:1}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fb{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#64748b}
.fb:hover{background:#f8fafc}
.fb.a{background:#0f172a;color:#fff;border-color:#0f172a}
.stg{margin-bottom:12px}
.sh{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;cursor:pointer;user-select:none}
.sh h3{font-size:13px;font-weight:700;flex:1;margin:0}
.sh.open{border-radius:10px 10px 0 0;border-bottom:1px solid #f1f5f9}
.cnts{display:flex;gap:4px;flex-wrap:wrap}
.cn{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600}
.cn-b{background:#ecfdf5;color:#065f46}
.cn-t{background:#eff6ff;color:#1e40af}
.cn-k{background:#f5f3ff;color:#4338ca}
.cn-c{background:#fef2f2;color:#991b1b}
.cn-d{background:#fefce8;color:#854d0e}
.body{background:#fff;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;padding:6px 0}
.hdr{display:grid;grid-template-columns:28px 1fr 70px 70px 70px 32px;gap:6px;padding:4px 14px;font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase}
.r{display:grid;grid-template-columns:28px 1fr 70px 70px 70px 32px;gap:6px;align-items:center;padding:6px 14px;font-size:12px}
.r:hover{background:#fafbfc}
.ic{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.r.both .ic{background:#ecfdf5;color:#059669}
.r.tegan .ic{background:#eff6ff;color:#2563eb}
.r.kosta .ic{background:#f5f3ff;color:#6366f1}
.r.conflict .ic{background:#fef2f2;color:#dc2626}
.r.dup .ic{background:#fefce8;color:#ca8a04}
.sq{font-family:monospace;font-size:10px;color:#94a3b8;margin-right:4px}
.fl{font-size:8px;padding:1px 5px;border-radius:3px;background:#eff6ff;color:#2563eb;font-weight:700;margin-left:4px}
.cp{font-size:8px;color:#10b981;margin-left:2px}
.note-text{padding:2px 14px 6px 48px;font-size:10px;color:#94a3b8;font-style:italic}
.note-input{margin:4px 14px 8px 48px;display:flex;gap:6px}
.note-input input{flex:1;padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;font-family:'Outfit',system-ui,sans-serif;outline:none}
.note-input input:focus{border-color:#3b82f6}
.note-input button{padding:5px 12px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer}
.note-save{background:#0f172a;color:#fff}
.note-del{background:#fef2f2;color:#991b1b}
.note-btn{font-size:11px;cursor:pointer;color:#94a3b8;width:32px;text-align:center}
.note-btn:hover{color:#3b82f6}
.chv{font-size:10px;color:#94a3b8;transition:transform .2s;display:inline-block;width:14px}
.chv.o{transform:rotate(90deg)}
.dash{color:#cbd5e1;font-size:10px}
.stat{font-size:10px;color:#94a3b8}
.email-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:8px;overflow:hidden}
.email-hdr{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.email-hdr .email-id{font-family:monospace;font-size:10px;color:#94a3b8;width:50px}
.email-hdr .email-title{font-size:12px;font-weight:600;flex:1}
.email-hdr .email-ch{font-size:9px;color:#64748b}
.email-body{padding:0 14px 14px 14px;border-top:1px solid #f1f5f9}
.email-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px}
.email-meta-label{font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:2px}
.email-meta-val{font-size:12px;color:#0f172a}
.email-meta-val.italic{font-style:italic;color:#64748b;font-size:11px}
.email-copy-box{background:#fafbfc;border-radius:8px;padding:14px 16px;border:1px solid #f1f5f9;margin-bottom:8px}
.email-copy-label{font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:8px}
.email-copy{font-size:12px;color:#1e293b;line-height:1.7;white-space:pre-wrap}
.sms-box{background:#fefce8;border-radius:8px;padding:10px 14px;border:1px solid #fef3c7}
.sms-label{font-size:8px;font-weight:700;color:#92400e;text-transform:uppercase;margin-bottom:4px}
.sms-copy{font-size:11px;color:#78350f;line-height:1.5}
.fv-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:10px}
.fv-card h3{font-size:14px;font-weight:700;margin-bottom:4px}
.fv-card .sub{font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.5}
.fv-before-after{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;align-items:start;margin-bottom:8px;font-size:12px}
.fv-before{background:#fef2f2;border-radius:8px;padding:10px 12px;color:#991b1b;line-height:1.5}
.fv-after{background:#ecfdf5;border-radius:8px;padding:10px 12px;color:#065f46;line-height:1.5}
.fv-arrow{text-align:center;color:#94a3b8;font-size:16px;padding-top:8px}
.build-item{display:flex;align-items:center;gap:10px;padding:8px 10px;font-size:12px;border-radius:6px;margin-bottom:2px}
.build-item:hover{background:#fafbfc}
.build-item .bi-label{flex:1;font-weight:500}
.build-item .bi-team{color:#64748b;font-size:10px;min-width:100px}
.build-item .bi-time{color:#94a3b8;font-size:10px;min-width:80px;text-align:right}
.lg{display:flex;gap:14px;margin-bottom:14px;font-size:11px;color:#64748b;flex-wrap:wrap;align-items:center}
.lg span{display:flex;align-items:center;gap:4px}
.ld{width:8px;height:8px;border-radius:50%;display:inline-block}
@media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr)}.r,.hdr{grid-template-columns:24px 1fr 60px 60px 60px 28px;font-size:11px}.nav a{font-size:10px;padding:6px 8px}.fv-before-after{grid-template-columns:1fr;gap:4px}.fv-arrow{display:none}}
</style>
</head>

let tab='dashboard',F='all',O={},notes=JSON.parse(localStorage.getItem('tmrw-notes')||'{}'),editingNote=null;
S.forEach(s=>O[s]=true);

function pc(s){if(!s)return'';return s==='Live'?'s-l':s==='Approved'?'s-a':s==='Blocked'?'s-b':s==='Planned'||s==='To Do'?'s-t':s==='To Review'?'s-r':s==='Stopped'?'s-s':'s-p';}
function checkPw(){var p=document.getElementById('pwInput').value;if(p==='startmytomorrow'){document.getElementById('pwGate').style.display='none';document.getElementById('mainContent').classList.remove('hidden');sessionStorage.setItem('tmrw-auth','1');render();}else{document.getElementById('pwErr').style.display='block';document.getElementById('pwInput').value='';}}
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
if(sessionStorage.getItem('tmrw-auth')==='1'){document.getElementById('pwGate').style.display='none';document.getElementById('mainContent').classList.remove('hidden');}

function saveNote(id,text){if(text.trim()){notes[id]=text.trim();}else{delete notes[id];}localStorage.setItem('tmrw-notes',JSON.stringify(notes));editingNote=null;render();}

function downloadCSV(){
  let rows=[['Stage','Seq','Title','Tegan Status','Kosta Status','Type','Flow','Note','User Note']];
  D.forEach(d=>{rows.push([d.st,d.sq||'',d.t,d.ts||'',d.ks||'',d.tp,d.fl||'',d.nt||'',notes[d.sq+d.t]||'']);});
  let csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tmrw-comparison-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

function renderNav(){
  let tabs=[{k:'dashboard',l:'Dashboard'},{k:'comparison',l:'Comparison'},{k:'emails',l:'Email Content'},{k:'future',l:'Future Vision'}];
  document.getElementById('nav').innerHTML=tabs.map(t=>'<a class="'+(tab===t.k?'act':'')+'" onclick="tab=\''+t.k+'\';render()">'+t.l+'</a>').join('');
}

function renderDashboard(){
  let tb=0,tt=0,tk=0,tc=0;
  D.forEach(d=>{if(d.tp==='both')tb++;else if(d.tp==='tegan')tt++;else if(d.tp==='kosta')tk++;else if(d.tp==='conflict')tc++;});
  let blocked=D.filter(d=>d.ts==='Blocked');
  let noteCount=Object.keys(notes).length;
  
  let h='<div class="cards"><div class="card"><div class="n">'+D.length+'</div><div class="l">Total comms</div></div>';
  h+='<div class="card"><div class="n" style="color:#059669">'+tb+'</div><div class="l">Matching</div></div>';
  h+='<div class="card"><div class="n" style="color:#dc2626">'+tc+'</div><div class="l">Conflicts</div></div>';
  h+='<div class="card"><div class="n" style="color:#2563eb">'+tt+'</div><div class="l">Only Tegan\'s</div></div>';
  h+='<div class="card"><div class="n" style="color:#6366f1">'+tk+'</div><div class="l">Only Kosta\'s</div></div>';
  h+='<div class="card"><div class="n" style="color:#ca8a04">'+noteCount+'</div><div class="l">Notes added</div></div></div>';

  // Action items
  h+='<div class="section"><h3>Action Items</h3>';
  h+='<h4>Blocked</h4>';
  blocked.forEach(d=>{h+='<div class="item"><span class="pill s-b">Blocked</span><span class="title">'+d.t+'</span></div>';});
  if(!blocked.length)h+='<div class="item" style="color:#94a3b8">No blocked items</div>';
  
  h+='<h4>Status Conflicts to Resolve ('+tc+')</h4>';
  h+='<div class="item" style="color:#64748b">Go to Comparison tab and filter by Conflicts to review with Kosta</div>';
  
  h+='<h4>Notes Added ('+noteCount+')</h4>';
  Object.entries(notes).forEach(([k,v])=>{h+='<div class="item"><span style="font-size:11px;color:#94a3b8;min-width:80px">'+k.substring(0,20)+'</span><span class="title">'+v+'</span></div>';});
  if(!noteCount)h+='<div class="item" style="color:#94a3b8">No notes yet. Add them in the Comparison tab.</div>';
  h+='</div>';

  // Build items from future vision
  h+='<div class="section"><h3>TMRW 1.5 Build Items</h3>';
  FV.buildItems.forEach(b=>{
    let pc=b.priority==='Critical'?'s-critical':b.priority==='High'?'s-high':'s-medium';
    h+='<div class="build-item"><span class="pill '+pc+'">'+b.priority+'</span><span class="bi-label">'+b.label+'</span><span class="bi-team">'+b.team+'</span><span class="bi-time">'+b.timeline+'</span></div>';
  });
  h+='</div>';

  // Phase readiness
  if(PA.length){
    h+='<div class="section"><h3>Phase Readiness</h3>';
    PA.forEach(p=>{
      let rc=p.readiness==='RED'?'s-b':p.readiness==='AMBER'?'s-r':'s-l';
      h+='<div class="item"><span class="pill '+rc+'">'+p.readiness+'</span><span class="title"><strong>Phase '+p.phaseNumber+': '+p.phase+'</strong></span></div>';
      h+='<div style="padding:0 10px 8px 70px;font-size:11px;color:#64748b">'+p.summary+'</div>';
    });
    h+='</div>';
  }
  return h;
}

function renderComparison(){
  let tb=0,tt=0,tk=0,tc=0,td=D.filter(d=>d.nt&&d.nt.includes('DOUBLE')).length;
  D.forEach(d=>{if(d.tp==='both')tb++;else if(d.tp==='tegan')tt++;else if(d.tp==='kosta')tk++;else if(d.tp==='conflict')tc++;});

  let h='<div class="lg"><span><span class="ld" style="background:#34d399"></span>In both</span><span><span class="ld" style="background:#60a5fa"></span>Only Tegan\'s</span><span><span class="ld" style="background:#a5b4fc"></span>Only Kosta\'s</span><span><span class="ld" style="background:#f87171"></span>Status conflict</span><span><span class="ld" style="background:#fbbf24"></span>Double-up</span></div>';
  h+='<div class="filters"><span style="font-size:11px;color:#94a3b8;font-weight:600">Filter:</span>';
  [['all','All ('+D.length+')'],['conflict','Conflicts ('+tc+')'],['tegan',"Only Tegan's ("+tt+')'],['kosta',"Only Kosta's ("+tk+')'],['both','In both ('+tb+')'],['dup','Double-ups ('+td+')']].forEach(([k,l])=>{
    h+='<span class="fb '+(F===k?'a':'')+'" onclick="F=\''+k+'\';render()">'+l+'</span>';
  });
  h+='</div>';
  h+='<div class="hdr"><div></div><div>Touchpoint</div><div>Tegan</div><div>Kosta</div><div>Status</div><div></div></div>';

  S.forEach(st=>{
    let items=D.filter(d=>d.st===st);
    let filtered=items.filter(d=>F==='all'?true:F==='dup'?(d.nt&&d.nt.includes('DOUBLE')):d.tp===F);
    if(!filtered.length)return;
    let bc=filtered.filter(d=>d.tp==='both').length,tg=filtered.filter(d=>d.tp==='tegan').length,ko=filtered.filter(d=>d.tp==='kosta').length,co=filtered.filter(d=>d.tp==='conflict').length,du=filtered.filter(d=>d.nt&&d.nt.includes('DOUBLE')).length;

    h+='<div class="stg"><div class="sh '+(O[st]?'open':'')+'" onclick="O[\''+st+'\']=!O[\''+st+'\'];render()">';
    h+='<span class="chv '+(O[st]?'o':'')+'">&#9654;</span><h3>'+st+'</h3><div class="cnts">';
    if(bc)h+='<span class="cn cn-b">'+bc+' both</span>';
    if(tg)h+='<span class="cn cn-t">'+tg+' T</span>';
    if(ko)h+='<span class="cn cn-k">'+ko+' K</span>';
    if(co)h+='<span class="cn cn-c">'+co+' !</span>';
    if(du)h+='<span class="cn cn-d">'+du+' dup</span>';
    h+='</div></div>';

    if(O[st]){
      h+='<div class="body">';
      filtered.forEach(d=>{
        let icon=d.tp==='both'?'=':d.tp==='conflict'?'!':d.tp==='tegan'?'T':'K';
        let cls=(d.nt&&d.nt.includes('DOUBLE'))?'dup':d.tp;
        let fl=d.fl?'<span class="fl">'+d.fl+'</span>':'';
        let cp=d.kcp?'<span class="cp">&#9679;</span>':'';
        let stat=d.tp==='both'?'<span class="stat">match</span>':d.tp==='conflict'?'<span class="stat" style="color:#dc2626">diff</span>':d.tp==='tegan'?'<span class="stat">T only</span>':'<span class="stat">K only</span>';
        let nid=d.sq+d.t;
        let hasNote=notes[nid];
        let isEditing=editingNote===nid;

        h+='<div class="r '+cls+'"><div class="ic">'+icon+'</div>';
        h+='<div><span class="sq">'+(d.sq||'')+'</span> '+d.t+fl+cp+'</div>';
        h+='<div>'+(d.ts?'<span class="pill '+pc(d.ts)+'">'+d.ts+'</span>':'<span class="dash">&mdash;</span>')+'</div>';
        h+='<div>'+(d.ks?'<span class="pill '+pc(d.ks)+'">'+d.ks+'</span>':'<span class="dash">&mdash;</span>')+'</div>';
        h+='<div>'+stat+'</div>';
        h+='<div class="note-btn" onclick="editingNote=\''+(nid).replace(/'/g,"\\'")+'\'===editingNote?null:\''+(nid).replace(/'/g,"\\'")+'\';render()" title="'+(hasNote?'Edit note':'Add note')+'">'+(hasNote?'&#9998;':'&#43;')+'</div>';
        h+='</div>';

        if(d.nt)h+='<div class="note-text">&#9888; '+d.nt+'</div>';
        if(hasNote&&!isEditing)h+='<div class="note-text" style="color:#2563eb">&#128221; '+notes[nid]+'</div>';
        if(isEditing){
          h+='<div class="note-input"><input id="ni-'+nid.replace(/[^a-z0-9]/gi,'')+'" value="'+(notes[nid]||'').replace(/"/g,'&quot;')+'" placeholder="Add a note for this item..." onkeydown="if(event.key===\'Enter\')saveNote(\''+nid.replace(/'/g,"\\'")+'\',this.value)">';
          h+='<button class="note-save" onclick="saveNote(\''+nid.replace(/'/g,"\\'")+'\',document.getElementById(\'ni-'+nid.replace(/[^a-z0-9]/gi,'')+'\').value)">Save</button>';
          if(hasNote)h+='<button class="note-del" onclick="saveNote(\''+nid.replace(/'/g,"\\'")+'\',\'\')">Delete</button>';
          h+='</div>';
        }
      });
      h+='</div>';
    }
    h+='</div>';
  });
  return h;
}

      {id:"DU-3",t:"Name the Friction (+8d)",sub:"Quick question",from:"TMRW Health",ch:"Email only",body:"Hi {{first_name}},\n\nYour dashboard has been ready for about a week. Sometimes the reason people don't book isn't because they're too busy. Sometimes it's because the dashboard feels like a lot, or you're not sure what the call involves.\n\nThe Insights Call is designed for exactly that. It's a conversation, not a presentation. We start wherever you are.\n\nBook a time: {{booking_link}}\n\nTMRW Health"},
      {id:"DU-4",t:"Clinician Manual Outreach (+10d)",sub:"N/A - personal message",from:"Clinician",ch:"Email/Call/SMS",body:"[MANUAL] Day 10. Not automated. Not templated.\n\nSystem notifies the assigned clinician. They reach out personally. The value is that it feels different from the automated sequence."},
    ]},
    {name:"Precision Pods",emails:[
      {id:"PP-1.0",t:"Order Placed",sub:"Order confirmed",from:"The TMRW Team",ch:"Email + SMS",body:"Your Precision Pod order is confirmed.\n\nFormulated from your biology, checked by your clinical team, compounded under pharmacist supervision.\n\nYour order goes through clinical review, then formulation, then ships. Track progress in your Dashboard."},
      {id:"PP-1.1",t:"Quality Check by Pharmacist",sub:"Your order is with our pharmacy team",from:"The TMRW Team",ch:"Email",body:"Your Precision Pod order is now with our pharmacy team.\n\nA licensed compounding pharmacist is reviewing your formulation. Once approved, dispatched within 48-72 hours.\n\nThis is the part where your biology becomes something you can hold in your hand."},
      {id:"PP-1.2",t:"Order Shipped",sub:"Your Precision Pods have shipped.",from:"The TMRW Team",ch:"Email + SMS",body:"Your Precision Pods are on their way.\n\nTracking: {{tracking_link}}\n\nHow to take them: Tear the seal. Create a small hollow on your tongue. Pour granules in. Sip water, tilt head, swallow. Repeat.\n\nTip: Don't try the whole serving in one go.\n\nStorage: Below 25 degrees."},
      {id:"PP-1.4",t:"2-Week Check-in",sub:"How are the pods going?",from:"Your TMRW Clinical Team",ch:"Email",body:"It's been about two weeks since your Precision Pods arrived.\n\nSome people notice changes in energy, sleep, or digestion early. Some don't notice much yet. All of that is useful information.\n\nJust hit reply and let us know how it's going."},
    ]},
    {name:"Re-Engagement",emails:[
      {id:"1A",t:"Seg 1 - Invited, Didn't Convert",sub:"A few things have changed",from:"Mark Britt, CEO",ch:"Email",body:"Hi {{first_name}},\n\nYou signed up to TMRW a while ago. We sent you an invitation, and life got in the way.\n\nSince you last heard from us, we've been working with a small group of early members. What exists now is built on what we learned from them.\n\nPrecision Pods, expanded clinical team, retest every 3 months, rebuilt platform.\n\nCode WELCOMEBACK: $249.50 to join, $124.50/month for first 3 months.\n\n48 hours. No lock-in.\n\nMark Britt, CEO, TMRW"},
      {id:"1B",t:"Seg 1 - Waitlist, Never Invited",sub:"Your TMRW spot is ready",from:"Mark Britt, CEO",ch:"Email",body:"Hi {{first_name}},\n\nYou signed up to the TMRW waitlist a while ago, and it's taken us longer than expected to get back to you.\n\nSame product updates as 1A.\n\nYour spot is held for 48 hours. No lock-in.\n\nMark Britt, CEO, TMRW"},
    ]},
    {name:"Pods Broadcast",emails:[
      {id:"BC",t:"Precision Pods in Your Shop",sub:"We built something for you.",from:"Mark Britt, CEO",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYou can now purchase Precision Pods directly from your Dashboard.\n\nPersonalised supplements, compounded from 107+ available ingredients, dosed to what your biology shows. One pod a day.\n\nThe bit I'm most proud of: they don't stay the same. Every time you retest, your formulation updates.\n\n$179/month subscription.\n\nMark Britt, CEO, TMRW",sms:"Precision Pods are now available in your Dashboard. Head to Your Shop: {{Dashboard Link}}"},
    ]},
  ];

  flows.forEach(fl=>{
    h+='<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><h3 style="font-size:13px;font-weight:700">'+fl.name+'</h3><span style="font-size:9px;color:#94a3b8">'+fl.emails.length+' emails</span></div>';
    fl.emails.forEach(em=>{
      let oid='em-'+em.id;
      let isOpen=O[oid];
      h+='<div class="email-card"><div class="email-hdr" onclick="O[\''+oid+'\']=!O[\''+oid+'\'];render()">';
      h+='<span class="chv '+(isOpen?'o':'')+'">&#9654;</span>';
      h+='<span class="email-id">'+em.id+'</span>';
      h+='<span class="email-title">'+em.t+'</span>';
      h+='<span class="email-ch">'+em.ch+'</span></div>';
      if(isOpen){
        h+='<div class="email-body"><div class="email-meta">';
        h+='<div><div class="email-meta-label">Subject</div><div class="email-meta-val">'+em.sub+'</div></div>';
        h+='<div><div class="email-meta-label">From</div><div class="email-meta-val">'+em.from+'</div></div></div>';
        h+='<div class="email-copy-box"><div class="email-copy-label">Email copy</div><div class="email-copy">'+em.body.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
        if(em.sms){h+='<div class="sms-box"><div class="sms-label">SMS</div><div class="sms-copy">'+em.sms+'</div></div>';}
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}

function renderFuture(){
  let h='';
  // Hero
  h+='<div class="section" style="background:#0f172a;color:#fff;border:none"><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px">'+FV.hero.eyebrow+'</div>';
  h+='<h2 style="font-size:20px;font-weight:800;margin-bottom:6px">'+FV.hero.title+'</h2>';
  h+='<p style="font-size:12px;color:#94a3b8;line-height:1.6">'+FV.hero.subtitle+'</p>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px">';
  FV.netStats.forEach(s=>{
    h+='<div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#34d399">'+(s.after||'')+'</div>';
    h+='<div style="font-size:10px;color:#94a3b8">'+s.label+'</div>';
    if(s.sub)h+='<div style="font-size:9px;color:#64748b">'+s.sub+'</div>';
    h+='</div>';
  });
  h+='</div></div>';

  // Current problems
  h+='<div class="section"><h3>Current Journey Problems</h3>';
  FV.problems.forEach(p=>{
    h+='<div class="item" style="flex-direction:column;align-items:start;gap:4px;padding:10px"><strong style="font-size:13px">'+p.title+'</strong><span style="font-size:11px;color:#64748b;line-height:1.5">'+p.body+'</span></div>';
  });
  h+='</div>';

  // Before/After
  h+='<div class="section"><h3>What Changes</h3>';
  FV.fromTo.forEach(f=>{
    h+='<div class="fv-before-after"><div class="fv-before">'+f.before+'</div><div class="fv-arrow">&rarr;</div><div class="fv-after">'+f.after+'</div></div>';
  });
  h+='</div>';

  // 3-tier pod model
  h+='<div class="section"><h3>Three-Tier Pod Model</h3>';
  FV.suppTiers.forEach(s=>{
    h+='<div class="fv-card" style="margin-bottom:8px"><h3>'+s.tier+'</h3><div class="sub">'+s.what+'</div>';
    h+='<div style="font-size:11px;color:#64748b;line-height:1.5">'+s.why+'</div></div>';
  });
  h+='</div>';

  // Operational changes
  h+='<div class="section"><h3>Operational Changes</h3>';
  FV.ops.forEach(o=>{
    h+='<div style="padding:8px 0;border-bottom:1px solid #f1f5f9"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+o.title+'</div>';
    h+='<div style="font-size:11px;color:#64748b;line-height:1.5"><strong>Was:</strong> '+o.was+'</div>';
    h+='<div style="font-size:11px;color:#065f46;line-height:1.5"><strong>Now:</strong> '+o.now+'</div>';
    h+='<div style="font-size:10px;color:#94a3b8;margin-top:2px">Impact: '+o.impact+'</div></div>';
  });
  h+='</div>';

  // Build items
  h+='<div class="section"><h3>Build Items & Timeline</h3>';
  FV.buildItems.forEach(b=>{
    let pc=b.priority==='Critical'?'s-critical':b.priority==='High'?'s-high':'s-medium';
    h+='<div class="build-item"><span class="pill '+pc+'">'+b.priority+'</span><span class="bi-label">'+b.label+'</span><span class="bi-team">'+b.team+'</span><span class="bi-time">'+b.timeline+'</span></div>';
  });
  h+='</div>';

  // Trade-offs
  h+='<div class="section"><h3>Trade-offs & Risks</h3>';
  FV.tradeOffs.forEach(t=>{
    h+='<div style="padding:8px 0;border-bottom:1px solid #f1f5f9"><div style="font-size:12px;color:#991b1b;margin-bottom:4px"><strong>Risk:</strong> '+t.risk+'</div>';
    h+='<div style="font-size:11px;color:#065f46">'+t.mitigation+'</div></div>';
  });
  h+='</div>';

  return h;
}

function render(){
  renderNav();
  let c='';
  if(tab==='dashboard')c=renderDashboard();
  else if(tab==='comparison')c=renderComparison();
  else if(tab==='emails')c=renderEmails();
  else if(tab==='future')c=renderFuture();
  document.getElementById('content').innerHTML=c;
  if(editingNote){
    let el=document.querySelector('.note-input input');
    if(el)el.focus();
  }
}

render();
</script>
</body>
</html>
