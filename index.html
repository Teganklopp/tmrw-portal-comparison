<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:#f4f5f7;color:#0f172a;min-height:100vh}
.pw-gate{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999}
.pw-box{text-align:center;color:#fff;width:320px}
.pw-box .pw-logo{font-size:20px;font-weight:800;margin-bottom:4px}
.pw-box .pw-sub{font-size:11px;color:#64748b;margin-bottom:28px}
.pw-box input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#fff;font-family:'Outfit',system-ui,sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.pw-box input::placeholder{color:#475569}
.pw-box input:focus{border-color:#3b82f6}
.pw-box button{width:100%;padding:12px;border-radius:8px;border:none;background:#fff;color:#0f172a;font-family:'Outfit',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.pw-box button:hover{background:#e2e8f0}
.pw-err{color:#f87171;font-size:11px;margin-top:8px;display:none}
.content-hidden{display:none}
header{background:#0f172a;color:#fff;padding:0 20px;display:flex;align-items:center;height:48px;position:sticky;top:0;z-index:100}
header .logo{font-size:14px;font-weight:800;margin-right:8px}
header .sub{font-size:10px;color:#64748b}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.sc{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:14px;text-align:center}
.sc .n{font-size:26px;font-weight:700}
.sc .l{font-size:10px;color:#94a3b8;margin-top:3px;text-transform:uppercase;font-weight:600}
.legend{display:flex;gap:16px;margin-bottom:16px;font-size:11px;color:#64748b;flex-wrap:wrap;align-items:center}
.legend span{display:flex;align-items:center;gap:5px}
.ld{width:9px;height:9px;border-radius:50%;display:inline-block}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.fb{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#64748b;transition:all .15s}
.fb:hover{background:#f8fafc}
.fb.a{background:#0f172a;color:#fff;border-color:#0f172a}
.stg{margin-bottom:12px}
.sh{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;cursor:pointer;user-select:none}
.sh h3{font-size:13px;font-weight:700;flex:1}
.sh.open{border-radius:10px 10px 0 0;border-bottom:1px solid #f1f5f9}
.cnts{display:flex;gap:4px;flex-wrap:wrap}
.cn{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600}
.cn-b{background:#ecfdf5;color:#065f46}
.cn-t{background:#eff6ff;color:#1e40af}
.cn-k{background:#eef2ff;color:#4338ca}
.cn-c{background:#fef2f2;color:#991b1b}
.cn-d{background:#fefce8;color:#854d0e}
.body{background:#fff;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;padding:6px 0}
.hdr{display:grid;grid-template-columns:28px 1fr 82px 82px 80px;gap:6px;padding:5px 14px;font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.r{display:grid;grid-template-columns:28px 1fr 82px 82px 80px;gap:6px;align-items:center;padding:6px 14px;font-size:12px}
.r:hover{background:#fafbfc}
.ic{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.r.both .ic{background:#ecfdf5;color:#059669}
.r.tegan .ic{background:#eff6ff;color:#2563eb}
.r.kosta .ic{background:#eef2ff;color:#6366f1}
.r.conflict .ic{background:#fef2f2;color:#dc2626}
.r.dup .ic{background:#fefce8;color:#ca8a04}
.sq{font-family:monospace;font-size:10px;color:#94a3b8;margin-right:4px}
.pl{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600}
.s-l{background:#ecfdf5;color:#065f46}
.s-a{background:#eff6ff;color:#1e40af}
.s-b{background:#fef2f2;color:#991b1b}
.s-p{background:#fefce8;color:#854d0e}
.s-t{background:#eef2ff;color:#4338ca}
.s-r{background:#fefce8;color:#854d0e}
.s-s{background:#f1f5f9;color:#64748b}
.dash{font-size:10px;color:#cbd5e1}
.note{padding:2px 14px 8px 48px;font-size:10px;color:#94a3b8;font-style:italic;line-height:1.4}
.fl{font-size:8px;padding:1px 5px;border-radius:3px;background:#eff6ff;color:#2563eb;font-weight:700;margin-left:4px}
.cp{font-size:8px;color:#10b981;margin-left:2px}
.chv{font-size:10px;color:#94a3b8;transition:transform .2s;display:inline-block;width:14px}
.chv.o{transform:rotate(90deg)}
.stat{font-size:10px;color:#94a3b8}
@media(max-width:700px){.summary{grid-template-columns:repeat(3,1fr)}.r,.hdr{grid-template-columns:24px 1fr 60px 60px 60px;font-size:11px}}
</style>
</head>

<div class="sc"><div class="n" style="color:#059669">${tb}</div><div class="l">In both</div></div>
<div class="sc"><div class="n" style="color:#2563eb">${tt}</div><div class="l">Only Tegan's</div></div>
<div class="sc"><div class="n" style="color:#6366f1">${tk}</div><div class="l">Only Kosta's</div></div>

<span style="margin-left:auto;font-size:10px;color:#94a3b8"><span class="cp">\u25cf</span> = copy exists in Kosta's</span>
</div>
<div class="filters">
<span style="font-size:11px;color:#94a3b8;font-weight:600">Filter:</span>
<span class="fb ${F==='all'?'a':''}" onclick="F='all';render()">All (${D.length})</span>
<span class="fb ${F==='conflict'?'a':''}" onclick="F='conflict';render()">Conflicts (${tc})</span>
<span class="fb ${F==='tegan'?'a':''}" onclick="F='tegan';render()">Only Tegan's (${tt})</span>
<span class="fb ${F==='kosta'?'a':''}" onclick="F='kosta';render()">Only Kosta's (${tk})</span>
<span class="fb ${F==='both'?'a':''}" onclick="F='both';render()">In both (${tb})</span>
<span class="fb ${F==='dup'?'a':''}" onclick="F='dup';render()">Double-ups (${td})</span>
</div>
<div class="hdr"><div></div><div>Touchpoint</div><div>Tegan's</div><div>Kosta's</div><div></div></div>`;

S.forEach(st=>{

</div></div>`;

if(O[st]){
h+=`<div class="body">`;
filtered.forEach(d=>{
let icon=d.tp==='both'?'=':d.tp==='conflict'?'!':d.tp==='tegan'?'T':'K';

let fl=d.fl?`<span class="fl">${d.fl}</span>`:'';
let cp=d.kcp?`<span class="cp">\u25cf</span>`:'';

h+=`<div class="r ${cls}">
<div class="ic">${icon}</div>
<div><span class="sq">${d.sq||''}</span> ${d.t}${fl}${cp}</div>
<div>${d.ts?`<span class="pl ${pc(d.ts)}">${d.ts}</span>`:'<span class="dash">\u2014</span>'}</div>
<div>${d.ks?`<span class="pl ${pc(d.ks)}">${d.ks}</span>`:'<span class="dash">\u2014</span>'}</div>
<div>${stat}</div>
</div>`;
if(d.nt)h+=`<div class="note">\u26a0 ${d.nt}</div>`;
});
h+=`</div>`;}
h+=`</div>`;
