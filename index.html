<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMRW Portal Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:#f4f5f7;color:#0f172a;min-height:100vh}
.pw-gate{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999}
.pw-box{text-align:center;color:#fff;width:320px}
.pw-box .pw-logo{font-size:20px;font-weight:800;margin-bottom:4px}
.pw-box .pw-sub{font-size:11px;color:#64748b;margin-bottom:28px}
.pw-box input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#fff;font-family:'Outfit',system-ui,sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.pw-box input::placeholder{color:#475569}
.pw-box input:focus{border-color:#3b82f6}
.pw-box button{width:100%;padding:12px;border-radius:8px;border:none;background:#fff;color:#0f172a;font-family:'Outfit',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.pw-box button:hover{background:#e2e8f0}
.pw-err{color:#f87171;font-size:11px;margin-top:8px;display:none}
.hidden{display:none!important}
header{background:#0f172a;color:#fff;padding:0 20px;display:flex;align-items:center;height:48px;position:sticky;top:0;z-index:100;gap:16px}
header .logo{font-size:14px;font-weight:800;white-space:nowrap}
.nav{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav a{padding:6px 12px;font-size:11px;font-weight:600;color:#94a3b8;cursor:pointer;border-radius:6px;white-space:nowrap;transition:all .15s}
.nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav a.act{color:#fff;background:rgba(255,255,255,.12)}
.dl-btn{padding:6px 14px;font-size:10px;font-weight:700;background:#fff;color:#0f172a;border:none;border-radius:6px;cursor:pointer;white-space:nowrap}
.dl-btn:hover{background:#e2e8f0}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:14px;text-align:center}
.card .n{font-size:24px;font-weight:700}
.card .l{font-size:10px;color:#94a3b8;margin-top:3px;text-transform:uppercase;font-weight:600}
.section{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:14px}
.section h3{font-size:13px;font-weight:700;margin-bottom:10px}
.section h4{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin:12px 0 6px}
.pill{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600}
.s-live,.s-l{background:#ecfdf5;color:#065f46}
.s-approved,.s-a{background:#eff6ff;color:#1e40af}
.s-blocked,.s-b{background:#fef2f2;color:#991b1b}
.s-planned,.s-p,.s-todo,.s-t{background:#f5f3ff;color:#4338ca}
.s-review,.s-r{background:#fefce8;color:#854d0e}
.s-stopped,.s-s{background:#f1f5f9;color:#64748b}
.s-critical{background:#fef2f2;color:#991b1b}
.s-high{background:#fefce8;color:#854d0e}
.s-medium{background:#eff6ff;color:#1e40af}
.item{padding:8px 10px;border-radius:6px;font-size:12px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.item:hover{background:#fafbfc}
.item .title{flex:1}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fb{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#64748b}
.fb:hover{background:#f8fafc}
.fb.a{background:#0f172a;color:#fff;border-color:#0f172a}
.stg{margin-bottom:12px}
.sh{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;cursor:pointer;user-select:none}
.sh h3{font-size:13px;font-weight:700;flex:1;margin:0}
.sh.open{border-radius:10px 10px 0 0;border-bottom:1px solid #f1f5f9}
.cnts{display:flex;gap:4px;flex-wrap:wrap}
.cn{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600}
.cn-b{background:#ecfdf5;color:#065f46}
.cn-t{background:#eff6ff;color:#1e40af}
.cn-k{background:#f5f3ff;color:#4338ca}
.cn-c{background:#fef2f2;color:#991b1b}
.cn-d{background:#fefce8;color:#854d0e}
.body{background:#fff;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;padding:6px 0}
.hdr{display:grid;grid-template-columns:28px 1fr 70px 70px 70px 32px;gap:6px;padding:4px 14px;font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase}
.r{display:grid;grid-template-columns:28px 1fr 70px 70px 70px 32px;gap:6px;align-items:center;padding:6px 14px;font-size:12px}
.r:hover{background:#fafbfc}
.ic{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.r.both .ic{background:#ecfdf5;color:#059669}
.r.tegan .ic{background:#eff6ff;color:#2563eb}
.r.kosta .ic{background:#f5f3ff;color:#6366f1}
.r.conflict .ic{background:#fef2f2;color:#dc2626}
.r.dup .ic{background:#fefce8;color:#ca8a04}
.sq{font-family:monospace;font-size:10px;color:#94a3b8;margin-right:4px}
.fl{font-size:8px;padding:1px 5px;border-radius:3px;background:#eff6ff;color:#2563eb;font-weight:700;margin-left:4px}
.cp{font-size:8px;color:#10b981;margin-left:2px}
.note-text{padding:2px 14px 6px 48px;font-size:10px;color:#94a3b8;font-style:italic}
.note-input{margin:4px 14px 8px 48px;display:flex;gap:6px}
.note-input input{flex:1;padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;font-family:'Outfit',system-ui,sans-serif;outline:none}
.note-input input:focus{border-color:#3b82f6}
.note-input button{padding:5px 12px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer}
.note-save{background:#0f172a;color:#fff}
.note-del{background:#fef2f2;color:#991b1b}
.note-btn{font-size:11px;cursor:pointer;color:#94a3b8;width:32px;text-align:center}
.note-btn:hover{color:#3b82f6}
.chv{font-size:10px;color:#94a3b8;transition:transform .2s;display:inline-block;width:14px}
.chv.o{transform:rotate(90deg)}
.dash{color:#cbd5e1;font-size:10px}
.stat{font-size:10px;color:#94a3b8}
.email-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:8px;overflow:hidden}
.email-hdr{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.email-hdr .email-id{font-family:monospace;font-size:10px;color:#94a3b8;width:50px}
.email-hdr .email-title{font-size:12px;font-weight:600;flex:1}
.email-hdr .email-ch{font-size:9px;color:#64748b}
.email-body{padding:0 14px 14px 14px;border-top:1px solid #f1f5f9}
.email-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px}
.email-meta-label{font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:2px}
.email-meta-val{font-size:12px;color:#0f172a}
.email-meta-val.italic{font-style:italic;color:#64748b;font-size:11px}
.email-copy-box{background:#fafbfc;border-radius:8px;padding:14px 16px;border:1px solid #f1f5f9;margin-bottom:8px}
.email-copy-label{font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:8px}
.email-copy{font-size:12px;color:#1e293b;line-height:1.7;white-space:pre-wrap}
.sms-box{background:#fefce8;border-radius:8px;padding:10px 14px;border:1px solid #fef3c7}
.sms-label{font-size:8px;font-weight:700;color:#92400e;text-transform:uppercase;margin-bottom:4px}
.sms-copy{font-size:11px;color:#78350f;line-height:1.5}
.fv-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:10px}
.fv-card h3{font-size:14px;font-weight:700;margin-bottom:4px}
.fv-card .sub{font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.5}
.fv-before-after{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;align-items:start;margin-bottom:8px;font-size:12px}
.fv-before{background:#fef2f2;border-radius:8px;padding:10px 12px;color:#991b1b;line-height:1.5}
.fv-after{background:#ecfdf5;border-radius:8px;padding:10px 12px;color:#065f46;line-height:1.5}
.fv-arrow{text-align:center;color:#94a3b8;font-size:16px;padding-top:8px}
.build-item{display:flex;align-items:center;gap:10px;padding:8px 10px;font-size:12px;border-radius:6px;margin-bottom:2px}
.build-item:hover{background:#fafbfc}
.build-item .bi-label{flex:1;font-weight:500}
.build-item .bi-team{color:#64748b;font-size:10px;min-width:100px}
.build-item .bi-time{color:#94a3b8;font-size:10px;min-width:80px;text-align:right}
.lg{display:flex;gap:14px;margin-bottom:14px;font-size:11px;color:#64748b;flex-wrap:wrap;align-items:center}
.lg span{display:flex;align-items:center;gap:4px}
.ld{width:8px;height:8px;border-radius:50%;display:inline-block}
@media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr)}.r,.hdr{grid-template-columns:24px 1fr 60px 60px 60px 28px;font-size:11px}.nav a{font-size:10px;padding:6px 8px}.fv-before-after{grid-template-columns:1fr;gap:4px}.fv-arrow{display:none}}
</style>
</head>

</div>
</div>
<div id="mainContent" class="hidden">

<button class="dl-btn" onclick="downloadCSV()">Download CSV</button>
</header>
<div class="wrap" id="content"></div>
</div>

let tab='dashboard',F='all',O={},notes=JSON.parse(localStorage.getItem('tmrw-notes')||'{}'),editingNote=null;
S.forEach(s=>O[s]=true);

function pc(s){if(!s)return'';return s==='Live'?'s-l':s==='Approved'?'s-a':s==='Blocked'?'s-b':s==='Planned'||s==='To Do'?'s-t':s==='To Review'?'s-r':s==='Stopped'?'s-s':'s-p';}
function checkPw(){var p=document.getElementById('pwInput').value;if(p==='startmytomorrow'){document.getElementById('pwGate').style.display='none';document.getElementById('mainContent').classList.remove('hidden');sessionStorage.setItem('tmrw-auth','1');render();}else{document.getElementById('pwErr').style.display='block';document.getElementById('pwInput').value='';}}
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
if(sessionStorage.getItem('tmrw-auth')==='1'){document.getElementById('pwGate').style.display='none';document.getElementById('mainContent').classList.remove('hidden');}

function saveNote(id,text){if(text.trim()){notes[id]=text.trim();}else{delete notes[id];}localStorage.setItem('tmrw-notes',JSON.stringify(notes));editingNote=null;render();}

function downloadCSV(){
  let rows=[['Stage','Seq','Title','Tegan Status','Kosta Status','Type','Flow','Note','User Note']];
  D.forEach(d=>{rows.push([d.st,d.sq||'',d.t,d.ts||'',d.ks||'',d.tp,d.fl||'',d.nt||'',notes[d.sq+d.t]||'']);});
  let csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tmrw-comparison-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

function renderNav(){
  let tabs=[{k:'dashboard',l:'Dashboard'},{k:'comparison',l:'Comparison'},{k:'emails',l:'Email Content'},{k:'future',l:'Future Vision'}];
  document.getElementById('nav').innerHTML=tabs.map(t=>'<a class="'+(tab===t.k?'act':'')+'" onclick="tab=\''+t.k+'\';render()">'+t.l+'</a>').join('');
}

function renderDashboard(){
  let tb=0,tt=0,tk=0,tc=0;
  D.forEach(d=>{if(d.tp==='both')tb++;else if(d.tp==='tegan')tt++;else if(d.tp==='kosta')tk++;else if(d.tp==='conflict')tc++;});
  let blocked=D.filter(d=>d.ts==='Blocked');
  let noteCount=Object.keys(notes).length;
  
  let h='<div class="cards"><div class="card"><div class="n">'+D.length+'</div><div class="l">Total comms</div></div>';
  h+='<div class="card"><div class="n" style="color:#059669">'+tb+'</div><div class="l">Matching</div></div>';
  h+='<div class="card"><div class="n" style="color:#dc2626">'+tc+'</div><div class="l">Conflicts</div></div>';
  h+='<div class="card"><div class="n" style="color:#2563eb">'+tt+'</div><div class="l">Only Tegan\'s</div></div>';
  h+='<div class="card"><div class="n" style="color:#6366f1">'+tk+'</div><div class="l">Only Kosta\'s</div></div>';
  h+='<div class="card"><div class="n" style="color:#ca8a04">'+noteCount+'</div><div class="l">Notes added</div></div></div>';

  // Action items
  h+='<div class="section"><h3>Action Items</h3>';
  h+='<h4>Blocked</h4>';
  blocked.forEach(d=>{h+='<div class="item"><span class="pill s-b">Blocked</span><span class="title">'+d.t+'</span></div>';});
  if(!blocked.length)h+='<div class="item" style="color:#94a3b8">No blocked items</div>';
  
  h+='<h4>Status Conflicts to Resolve ('+tc+')</h4>';
  h+='<div class="item" style="color:#64748b">Go to Comparison tab and filter by Conflicts to review with Kosta</div>';
  
  h+='<h4>Notes Added ('+noteCount+')</h4>';
  Object.entries(notes).forEach(([k,v])=>{h+='<div class="item"><span style="font-size:11px;color:#94a3b8;min-width:80px">'+k.substring(0,20)+'</span><span class="title">'+v+'</span></div>';});
  if(!noteCount)h+='<div class="item" style="color:#94a3b8">No notes yet. Add them in the Comparison tab.</div>';
  h+='</div>';

  // Build items from future vision
  h+='<div class="section"><h3>TMRW 1.5 Build Items</h3>';
  FV.buildItems.forEach(b=>{
    let pc=b.priority==='Critical'?'s-critical':b.priority==='High'?'s-high':'s-medium';
    h+='<div class="build-item"><span class="pill '+pc+'">'+b.priority+'</span><span class="bi-label">'+b.label+'</span><span class="bi-team">'+b.team+'</span><span class="bi-time">'+b.timeline+'</span></div>';
  });
  h+='</div>';

  // Phase readiness
  if(PA.length){
    h+='<div class="section"><h3>Phase Readiness</h3>';
    PA.forEach(p=>{
      let rc=p.readiness==='RED'?'s-b':p.readiness==='AMBER'?'s-r':'s-l';
      h+='<div class="item"><span class="pill '+rc+'">'+p.readiness+'</span><span class="title"><strong>Phase '+p.phaseNumber+': '+p.phase+'</strong></span></div>';
      h+='<div style="padding:0 10px 8px 70px;font-size:11px;color:#64748b">'+p.summary+'</div>';
    });
    h+='</div>';
  }
  return h;
}

function renderComparison(){
  let tb=0,tt=0,tk=0,tc=0,td=D.filter(d=>d.nt&&d.nt.includes('DOUBLE')).length;
  D.forEach(d=>{if(d.tp==='both')tb++;else if(d.tp==='tegan')tt++;else if(d.tp==='kosta')tk++;else if(d.tp==='conflict')tc++;});

  let h='<div class="lg"><span><span class="ld" style="background:#34d399"></span>In both</span><span><span class="ld" style="background:#60a5fa"></span>Only Tegan\'s</span><span><span class="ld" style="background:#a5b4fc"></span>Only Kosta\'s</span><span><span class="ld" style="background:#f87171"></span>Status conflict</span><span><span class="ld" style="background:#fbbf24"></span>Double-up</span></div>';
  h+='<div class="filters"><span style="font-size:11px;color:#94a3b8;font-weight:600">Filter:</span>';
  [['all','All ('+D.length+')'],['conflict','Conflicts ('+tc+')'],['tegan',"Only Tegan's ("+tt+')'],['kosta',"Only Kosta's ("+tk+')'],['both','In both ('+tb+')'],['dup','Double-ups ('+td+')']].forEach(([k,l])=>{
    h+='<span class="fb '+(F===k?'a':'')+'" onclick="F=\''+k+'\';render()">'+l+'</span>';
  });
  h+='</div>';
  h+='<div class="hdr"><div></div><div>Touchpoint</div><div>Tegan</div><div>Kosta</div><div>Status</div><div></div></div>';

  S.forEach(st=>{
    let items=D.filter(d=>d.st===st);
    let filtered=items.filter(d=>F==='all'?true:F==='dup'?(d.nt&&d.nt.includes('DOUBLE')):d.tp===F);
    if(!filtered.length)return;
    let bc=filtered.filter(d=>d.tp==='both').length,tg=filtered.filter(d=>d.tp==='tegan').length,ko=filtered.filter(d=>d.tp==='kosta').length,co=filtered.filter(d=>d.tp==='conflict').length,du=filtered.filter(d=>d.nt&&d.nt.includes('DOUBLE')).length;

    h+='<div class="stg"><div class="sh '+(O[st]?'open':'')+'" onclick="O[\''+st+'\']=!O[\''+st+'\'];render()">';
    h+='<span class="chv '+(O[st]?'o':'')+'">&#9654;</span><h3>'+st+'</h3><div class="cnts">';
    if(bc)h+='<span class="cn cn-b">'+bc+' both</span>';
    if(tg)h+='<span class="cn cn-t">'+tg+' T</span>';
    if(ko)h+='<span class="cn cn-k">'+ko+' K</span>';
    if(co)h+='<span class="cn cn-c">'+co+' !</span>';
    if(du)h+='<span class="cn cn-d">'+du+' dup</span>';
    h+='</div></div>';

    if(O[st]){
      h+='<div class="body">';
      filtered.forEach(d=>{
        let icon=d.tp==='both'?'=':d.tp==='conflict'?'!':d.tp==='tegan'?'T':'K';
        let cls=(d.nt&&d.nt.includes('DOUBLE'))?'dup':d.tp;
        let fl=d.fl?'<span class="fl">'+d.fl+'</span>':'';
        let cp=d.kcp?'<span class="cp">&#9679;</span>':'';
        let stat=d.tp==='both'?'<span class="stat">match</span>':d.tp==='conflict'?'<span class="stat" style="color:#dc2626">diff</span>':d.tp==='tegan'?'<span class="stat">T only</span>':'<span class="stat">K only</span>';
        let nid=d.sq+d.t;
        let hasNote=notes[nid];
        let isEditing=editingNote===nid;

        h+='<div class="r '+cls+'"><div class="ic">'+icon+'</div>';
        h+='<div><span class="sq">'+(d.sq||'')+'</span> '+d.t+fl+cp+'</div>';
        h+='<div>'+(d.ts?'<span class="pill '+pc(d.ts)+'">'+d.ts+'</span>':'<span class="dash">&mdash;</span>')+'</div>';
        h+='<div>'+(d.ks?'<span class="pill '+pc(d.ks)+'">'+d.ks+'</span>':'<span class="dash">&mdash;</span>')+'</div>';
        h+='<div>'+stat+'</div>';
        h+='<div class="note-btn" onclick="editingNote=\''+(nid).replace(/'/g,"\\'")+'\'===editingNote?null:\''+(nid).replace(/'/g,"\\'")+'\';render()" title="'+(hasNote?'Edit note':'Add note')+'">'+(hasNote?'&#9998;':'&#43;')+'</div>';
        h+='</div>';

        if(d.nt)h+='<div class="note-text">&#9888; '+d.nt+'</div>';
        if(hasNote&&!isEditing)h+='<div class="note-text" style="color:#2563eb">&#128221; '+notes[nid]+'</div>';
        if(isEditing){
          h+='<div class="note-input"><input id="ni-'+nid.replace(/[^a-z0-9]/gi,'')+'" value="'+(notes[nid]||'').replace(/"/g,'&quot;')+'" placeholder="Add a note for this item..." onkeydown="if(event.key===\'Enter\')saveNote(\''+nid.replace(/'/g,"\\'")+'\',this.value)">';
          h+='<button class="note-save" onclick="saveNote(\''+nid.replace(/'/g,"\\'")+'\',document.getElementById(\'ni-'+nid.replace(/[^a-z0-9]/gi,'')+'\').value)">Save</button>';
          if(hasNote)h+='<button class="note-del" onclick="saveNote(\''+nid.replace(/'/g,"\\'")+'\',\'\')">Delete</button>';
          h+='</div>';
        }
      });
      h+='</div>';
    }
    h+='</div>';
  });
  return h;
}

    {name:"Health Story Flow (8 emails)",emails:[
      {id:"HS-0A",t:"Get Started",sub:"One thing to do to get started",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour TMRW journey starts with your Health Story. It's a comprehensive form that tells your clinical team who you are, what's been going on for you, and where you want to focus.\n\nOnce it's done, everything unlocks. Your personalised blood test is prepared, and your core pod formula moves into creation. Nothing can start without it.\n\nTake your time with it and don't hold back. The more thorough you are, the better your plan will be.\n\n[START MY HEALTH STORY]\n\nThe TMRW Team",sms:"Your TMRW journey starts with your Health Story. Once it's done, your clinical plan, Core Pod formula, and blood test can begin: {{Health Story Link}}"},
      {id:"HS-0B",t:"Still Haven't Started (+48h)",sub:"Your clinical team is waiting to meet you",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYour clinical team is ready to get to work, but they need to know who you are first. That's what your Health Story is for.\n\nIt's how your clinical team gets to know you. The more you tell them, the more specific your plan, your Core Pod formula, and your blood test will be.\n\nEverything can begin once it's done.\n\n[START MY HEALTH STORY]\n\nIf something's getting in the way, just hit reply. We're here.\n\nThe TMRW Team"},
      {id:"HS-0C",t:"One Week Follow-Up",sub:"We don't want to start without you",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nWe know life gets busy. But we wanted to reach out one more time, because your clinical team is ready and everything that comes next depends on your Health Story.\n\nYour clinical plan, your Core Pod formula, your blood test. They're all built around what you tell us. The more you share, the more personalised they'll be.\n\nEverything is saved as you go, so you can do it in one sitting or come back to it.\n\n[START MY HEALTH STORY]\n\nIf you're unsure about anything, or if something's been holding you back, just hit reply. We'd genuinely like to help.\n\nThe TMRW Team"},
      {id:"HS-1",t:"Gentle Nudge (started, left)",sub:"Your Health Story unlocks everything",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYou started your Health Story, and it's saved and waiting for you.\n\nYour Health Story is what unlocks everything that comes next. Once it's complete, your clinical team can start building your plan, your Core Pod formula can be created to your biology, and your blood test can be ordered.\n\nIt's also what makes all of that personal. Without it, your results are just numbers. With it, your team can build something that actually reflects what's going on inside your body.\n\nAnd don't be afraid to go into detail. The more your team knows, the more precise everything that follows will be.\n\n[CONTINUE MY HEALTH STORY]\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Health Story is what makes your better TMRW plan yours. Your clinical plan, Core Pod formula, and blood test are all waiting on the other side: {{Health Story Link}}"},
      {id:"HS-2",t:"Progress Nudge (under 50%)",sub:"The best parts of your Health Story are still ahead",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYou've made a start on your Health Story. Everything so far is saved.\n\nThe sections still to go are the ones that matter most. They're the context that turns your data into something genuinely useful. It's what lets your clinical team look at your results and understand not just what the numbers say, but what they mean for you.\n\nIf something feels relevant, it probably is. The richer the picture you give your team, the more tailored your plan and your Core Pod formula will be.\n\nOnce it's done, your clinical plan, Core Pod formula, and blood test can all begin.\n\n[CONTINUE MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"HS-3",t:"Nearly There (over 50%)",sub:"Almost done. Your Core Pod formula is waiting.",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nYou're over halfway through your Health Story. The hard part is behind you.\n\nJust a few more sections and your clinical team will have the full picture. That means a plan built around your biology, not a template. A Core Pod formula created for what your body actually needs, not a generic supplement. A blood test ordered based on what matters for you specifically.\n\nEverything you've shared so far is saved. Pick up right where you left off.\n\n[FINISH MY HEALTH STORY]\n\nThe TMRW Team"},
      {id:"HS-4",t:"Final Nudge (+5 days)",sub:"Your clinical team is ready when you are",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour clinical team is ready to start working on your plan. Your Core Pod formula is ready to be created. Your blood test is ready to be ordered. The one thing they're all waiting on is your Health Story.\n\nWe could start without it. But we won't. Because without your Health Story, your team would be interpreting your results without the full picture of what's been going on for you and what actually matters to you. And that's not how this should work. You came to TMRW for something more personal than that.\n\nEverything you've entered so far is saved. You can pick up where you left off anytime.\n\n[COMPLETE MY HEALTH STORY]\n\nIf something's getting in the way, or you'd rather talk through it with someone, just hit reply. We're here.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your clinical team is ready to start but they're waiting on your Health Story. It's the one thing between you and your plan. Pick up where you left off: {{Health Story Link}}"},
      {id:"HS-5",t:"Technical Failure (submit failed)",sub:"Your Health Story didn't submit properly",from:"The TMRW Team",ch:"Email",body:"Hi {{first_name}},\n\nIt looks like something went wrong when you tried to submit your Health Story. Don't worry, all your answers are saved.\n\nJust head back in and hit submit again. It should only take a moment. Once it's through, your clinical team can start building your plan, your Core Pod formula can be created, and your blood test can be ordered. You were right there.\n\n[SUBMIT MY HEALTH STORY]\n\nIf it's still not working, hit reply and we'll sort it out for you.\n\nThe TMRW Team"},
    ]},
    {name:"Blood Test Flow",emails:[
      {id:"BT-1",t:"Requisition Sent",sub:"Your blood test requisition is ready",from:"The TMRW Team",ch:"Email + SMS + Slack",body:"Hi {{first_name}},\n\nYour blood test requisition has been sent through. Here's what you need to know before you go.\n\nPreparation:\nFast for 10 to 12 hours beforehand. Water is fine, and drink plenty of it the morning of. Avoid any strenuous exercise that morning. Try to get to the collection centre before 10am if you can.\n\nWhat to bring:\nYour referral (printed or on your phone), your Medicare card, and a photo ID.\n\nIf your clinical team has flagged any specific prep for your test, like cortisol timing or glucose tolerance, those instructions will be on your requisition.\n\nThat's it. Once your bloods are done, hit reply and let us know.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your blood test requisition has been sent. Fast 10 to 12 hours, drink plenty of water, and try to go before 10am. Check your email for the full prep details."},
      {id:"BT-2",t:"Blood Test 5-Day Follow-Up",sub:"Have you had your blood test?",from:"The TMRW Team",ch:"Email only",body:"Hi {{first_name}},\n\nWe sent your blood test requisition through a few days ago. Just checking in to see if you've had a chance to get it done.\n\nIf you have, hit reply and let us know. Your results will come through to us directly and we'll be in touch the moment they're in.\n\nIf you haven't got around to it yet, no stress. Just a reminder to fast for 10 to 12 hours and try to go before 10am. The sooner your bloods are done, the sooner your clinical team can get to work.\n\nThe TMRW Team"},
      {id:"BT-3",t:"Blood Test Results Received",sub:"Your blood test results are in.",from:"The TMRW Team",ch:"Email + SMS + Slack",body:"Hi {{first_name}},\n\nYour blood test results have come through. Your clinical team is reviewing them now and will be in touch once they've had a proper look.\n\nNothing you need to do on your end. We'll reach out when the review is done.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your blood test results are in. Your clinical team is reviewing them now and will be in touch soon."},
    ]},
    {name:"Dead Zone Sequence (10 emails)",emails:[
      {id:"DZ-1",t:"Sample Received",sub:"Your sample has arrived at our lab",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: sample_received_lab\n\nOne job: Confirm receipt. Set timeline (2-3 weeks). Set the communication contract: we won't go quiet."},
      {id:"DZ-2",t:"Inside Scoop: Sleep (+3d)",sub:"Uses existing Inside Scoop template (EDM8)",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 3d\n\nUses Kareema's existing Inside Scoop sleep video email. Only the intro block changes. Give the member something to act on immediately. Sleep is the universal first recommendation."},
      {id:"DZ-3",t:"Inside Scoop: Brain Fog (+7d)",sub:"Uses existing Inside Scoop template (EDM10)",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 7d\n\nUses Kareema's existing Inside Scoop brain fog video email. Only the intro block changes. Break the silence at one week. Address the near-universal concern."},
      {id:"DZ-4",t:"Results Preview (+12d)",sub:"Your results are getting closer",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: sample_received + 12d\n\nBuild anticipation. Reduce anxiety. Prepare the member for receiving results."},
      {id:"DZ-5",t:"Inside Scoop: Health Habits (+16d)",sub:"Uses existing Inside Scoop template",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 16d, results not ready\n\nPrepare the member for behaviour change before the plan arrives. Uses existing video email. Only sends if results not ready."},
      {id:"DZ-6",t:"Still Here Check-in (+18d)",sub:"Just checking in",from:"The TMRW Team",ch:"Email",body:"Trigger: sample_received + 18d, results not ready\n\nShow the member someone is still paying attention. Brevity is warmth."},
      {id:"DZ-7",t:"Delay Acknowledgment (+22d)",sub:"An update on your results",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: sample_received + 22d, results not ready\n\nAcknowledge the wait has exceeded the timeline. Proactive honesty."},
      {id:"DZ-8",t:"Clinician Manual Outreach (+28d)",sub:"N/A - manual",from:"Clinician",ch:"Email/Call",body:"[MANUAL] Day 28 or member expresses frustration.\n\nNo template. No automated copy. Clinician sends personal email or calls. A task is created in HubSpot. This member is a genuine outlier. They need a person, not a system."},
      {id:"QC-1",t:"QC Fail: Internal",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS",body:"Trigger: qc_fail_internal | Sentiment: 30\n\nOne job: Take complete ownership. The member must not feel like they failed. Fresh kit on the way, on us."},
      {id:"QC-2",t:"QC Fail: Lab",sub:"Your Little Prick Test Update",from:"The TMRW Team",ch:"Email + SMS + Call",body:"Trigger: qc_fail_lab | Sentiment: 25\n\nOne job: Save the member. This is the moment they are most likely to cancel. New kit within 48 hours + one month complimentary supplements."},
    ]},
    {name:"Dashboard Unlock v4",emails:[
      {id:"DU-1",t:"Dashboard Is Live",sub:"Your TMRW Dashboard is live",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nYour clinical analysis is complete and your TMRW Dashboard is live.\n\nLog in at app.startmytomorrow.com using your email address. You'll receive a 6-digit code as your password.\n\nInside you'll find your biological age clocks, your personalised health goals, and your Better TMRW Plan. Your plan is built across six areas of your health: Think, Eat, Move, Rest, Supplement, and Treat. Every recommendation comes from your data.\n\nYou'll also be receiving your Precision Pods. Your personalised supplement formula has been created based on your results, and your first order will be on its way. You'll find the details in Your Shop.\n\nThere's a lot in there. Take your time with it.\n\n[VIEW MY DASHBOARD]\n\nIf you'd like to go through your results with someone, you can book an Insights Call with your clinical team here: {{booking_link}}\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard is live at app.startmytomorrow.com. Your results, your Better TMRW Plan, and your Precision Pods are all ready. Have a look when you get a chance."},
      {id:"DU-2",t:"Haven't Logged In (+48h)",sub:"Have you seen your biological clocks?",from:"TMRW Health",ch:"Email only",body:"Hi {{first_name}},\n\nWe wanted to point you to one thing in your dashboard in particular.\n\nYour Biological Clocks show how your body is ageing at a cellular level compared to your actual age. It's usually the first thing members want to talk about, and it's a good place to start.\n\nFrom there, your Better TMRW Plan breaks everything down across Think, Eat, Move, Rest, Supplement, and Treat. Each one is built around what your results show.\n\nLog in at app.startmytomorrow.com and have a look.\n\n[VIEW MY DASHBOARD]\n\nIf you'd rather talk through your results first, you can book an Insights Call here: {{booking_link}}\n\nTMRW Health"},
      {id:"DU-3",t:"Name the Friction (+8d)",sub:"Quick question",from:"TMRW Health",ch:"Email + SMS",body:"Hi {{first_name}},\n\nWe wanted to reach out one more time.\n\nYour dashboard and results have been ready for about a week now, and we haven't heard from you. That's completely fine. But we also know that sometimes the reason people don't log in isn't because they're too busy. Sometimes it's because the dashboard feels like a lot to take in, or you're not sure where to start, or you just haven't got around to it.\n\nIf any of that sounds familiar, your clinical team is here. You can book an Insights Call and we'll go through everything together. You don't need to have looked at anything first. We start wherever you are.\n\n{{booking_link}}\n\nAnd if something else is going on, or you just have a question, hit reply. We're here.\n\nTMRW Health",sms:"Hey, it's TMRW. Your dashboard has been live for about a week. Your results and plan are ready whenever you are: app.startmytomorrow.com"},
      {id:"DU-4",t:"Clinician Manual Outreach (+10d)",sub:"N/A - personal message",from:"Clinician",ch:"Email/Call/SMS",body:"[MANUAL] Day 10. Not automated. Not templated.\n\nSystem notifies the assigned clinician via Oracle task and/or Slack. They reach out personally via their preferred channel. The value is that it feels different from the automated sequence. The clinician should reference what they know about the member and their data."},
    ]},
    {name:"Precision Pods (6 emails)",emails:[
      {id:"PP-1.0",t:"Order Placed",sub:"Order confirmed",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nWe've got your order.\n\nYour Precision Pods are being formulated from your biology, checked by your clinical team, and compounded using state-of-the-art technology under the supervision of a licensed pharmacist. It takes a bit longer than pulling something off a shelf, but that's the point.\n\nHere's what happens from here: your order goes through a final clinical review, then into formulation, then it ships. We'll send tracking when it's on the way.\n\nAnything you want to know in the meantime, your clinical team is here. You can check in on your order anytime in your Dashboard.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Precision Pods are currently being built to your biology. Check in anytime: {{Dashboard Link}}"},
      {id:"PP-1.1",t:"Quality Check by Pharmacist",sub:"Your order is with our pharmacy team",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Precision Pod order is now with our pharmacy team.\n\nRight now, a licensed compounding pharmacist is reviewing your formulation for accuracy and safety. Once approved, your Pods are compounded using state-of-the-art technology under their supervision, then packed and dispatched, usually within 48 to 72 hours.\n\nThis is the part where your biology becomes something you can hold in your hand.\n\nWe'll send tracking as soon as they ship.\n\nWe've got it from here.\n\nThe TMRW Team"},
      {id:"PP-1.2",t:"Order Shipped",sub:"Your Precision Pods have shipped.",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour Pods are on their way.\n\nTrack your delivery here: {{Tracking Link}}\n\nWhile you wait, here's how to get the most out of them once they arrive.\n\nHow to take your Precision Pods (one pod per day): Tear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat until the full serving is finished.\n\nTips for best results: Don't try to swallow the whole serving at once, take it gradually. Once the granules are in your mouth, swallow promptly rather than chewing or letting them sit. If you'd prefer an easier option, you can sprinkle the granules onto small spoonfuls of plain yoghurt and swallow without chewing.\n\nStorage: Store below 25 degrees C. Don't use a pod if the seal is broken. Keep out of reach of children.\n\nIf you notice any side effects or anything feels off, just hit reply and let us know.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your Precision Pods are on their way. Check your email for how to take them when they land. Track delivery: {{Tracking Link}}"},
      {id:"PP-1.3",t:"Order Delivered",sub:"Your Precision Pods have arrived.",from:"The TMRW Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYour Precision Pods are here. Built from your biology, reviewed by your clinical team, and now in your hands.\n\nBefore you get started, here's everything you need to know about taking them.\n\n{{Video: How to take your Precision Pods}}\n\nHow to take your Precision Pods (one pod per day): Tear off the seal and create a small hollow on your tongue. Pour a small amount of the granules in, sip water gently, tilt your head slightly back, and swallow. Repeat until the full serving is finished.\n\nStorage: Store below 25 degrees C. Don't use a pod if the seal is broken. Keep out of reach of children.\n\nThe TMRW Team"},
      {id:"PP-1.4",t:"2-Week Check-in",sub:"How are the pods going?",from:"Your TMRW Clinical Team",ch:"Email",body:"Hi {{customer.first_name}},\n\nYou're about two weeks into your Precision Pods. Your clinical team built that formulation around your specific biology, and this is the point where we like to check in.\n\nSome people notice changes in energy, sleep, or digestion early. Some notice shifts in focus or mood. Some don't notice much yet. All of that is useful information, and none of it is wrong.\n\nWe're interested in the subtle things as much as the obvious ones. The way you're waking up, how your energy holds through the afternoon, whether your gut feels any different.\n\nJust hit reply and let us know how you're going. Your feedback goes directly to your clinical team.\n\nYour TMRW Clinical Team"},
      {id:"PP-1.5",t:"Membership Renewal Reminder",sub:"Your next Precision Pods are on the way.",from:"The TMRW Team",ch:"Email + SMS",body:"Hi {{customer.first_name}},\n\nYour next set of Precision Pods is almost ready to begin.\n\nIn 3 days, your payment will process and your formulation moves to our pharmacy team for review, then into preparation and dispatch. Same precision, personalised to your biology, reviewed by your clinical team.\n\nIf you need to update your delivery details, pause, or make any changes, you can manage everything in your Dashboard.\n\nThe TMRW Team",sms:"Hey, it's TMRW. Your next Precision Pods begin formulation in 3 days. Need to make changes? {{Dashboard Link}}"},
    ]},
    {name:"Re-Engagement (4 variants)",emails:[
      {id:"1A",t:"Seg 1 - Invited, Didn't Convert",sub:"A few things have changed",from:"Mark Britt, CEO",ch:"Email",body:"Hi {{first_name}},\n\nYou signed up to TMRW a while ago. We sent you an invitation, and life got in the way. That happens. But TMRW has changed quite a bit since then, and I thought you should know.\n\nNot a rebrand-and-hope kind of change. Since you last heard from us, we've been working with a small group of early members. We listened to what worked, what didn't, and what they needed from us. What exists now is built on what we learned from them.\n\nPrecision Pods are now part of your membership. The clinical team has expanded. We retest every three months now, not six. And we've rebuilt the platform and the brand from the ground up.\n\nCode WELCOMEBACK: $249.50 to join, $124.50/month for first 3 months.\n\nActive for the next 48 hours. No lock-in.\n\nMark Britt, CEO, TMRW"},
      {id:"1B",t:"Seg 1 - Waitlist, Never Invited",sub:"Your TMRW spot is ready",from:"Mark Britt, CEO",ch:"Email",body:"Hi {{first_name}},\n\nYou signed up to the TMRW waitlist a while ago, and it's taken us longer than expected to get back to you.\n\nSame product updates as 1A.\n\nCode WELCOMEBACK: $249.50 to join, $124.50/month for first 3 months.\n\nYour spot is held for 48 hours. No lock-in.\n\nMark Britt, CEO, TMRW"},
      {id:"2A",t:"Seg 2 - Invited, Upgraded (25% to 50%)",sub:"A few things have changed",from:"Mark Britt, CEO",ch:"Email",body:"Hi {{first_name}},\n\nYou signed up to TMRW a while ago. We sent you a registration code, and the timing wasn't right.\n\nSame product updates. When you first signed up, your code gave you 25% off. We've restructured our pricing since then, and your code has been upgraded to 50%.\n\nCode WELCOMEBACK: $249.50 to join, $124.50/month for first 3 months.\n\nActive for the next 48 hours. No lock-in.\n\nMark Britt, CEO, TMRW"},
      {id:"2B",t:"Seg 2 - Waitlist, Upgraded (never saw 25%)",sub:"Your TMRW spot is ready",from:"Mark Britt, CEO",ch:"Email",body:"Hi {{first_name}},\n\nSame as 1B. No mention of upgrade since they never received the original 25% code.\n\nCode WELCOMEBACK: 50% off. $249.50 to join, $124.50/month for first 3 months.\n\nYour spot is held for 48 hours. No lock-in.\n\nMark Britt, CEO, TMRW"},
    ]},
    {name:"Pods Broadcast (updated)",emails:[
      {id:"BC",t:"Precision Pods in Your Shop",sub:"We built something for you.",from:"Mark Britt, CEO",ch:"Email + SMS",body:"Hi {{first_name}},\n\nWe've been working on something for a while, and it's ready.\n\nYou can now purchase Precision Pods directly from your Dashboard. This is probably the biggest thing we've added to the platform since you joined, and I wanted you to hear about it from me.\n\nSo what are they? Personalised supplements, compounded from 107+ available ingredients, dosed to what your biology actually shows. Your formulation is drawn from your results, reviewed by your clinical team, and a pharmacist oversees every dose. One pod a day.\n\nThe bit I'm most proud of: they don't stay the same. Every time you retest, your formulation updates. Your biology changes, your Pods change with it.\n\n$179 a month as a subscription, but as one of our early members, you get 20% off for life. Use code PODSVIP20 at checkout.\n\nMark Britt, CEO, TMRW",sms:"Precision Pods are now available in your Dashboard. Personalised supplements built from your biology. Head to Your Shop to take a look: {{Dashboard Link}}"},
    ]},
  ];

  flows.forEach(fl=>{
    h+='<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><h3 style="font-size:13px;font-weight:700">'+fl.name+'</h3><span style="font-size:9px;color:#94a3b8">'+fl.emails.length+' emails</span></div>';
    fl.emails.forEach(em=>{
      let oid='em-'+em.id;
      let isOpen=O[oid];
      h+='<div class="email-card"><div class="email-hdr" onclick="O[\''+oid+'\']=!O[\''+oid+'\'];render()">';
      h+='<span class="chv '+(isOpen?'o':'')+'">&#9654;</span>';
      h+='<span class="email-id">'+em.id+'</span>';
      h+='<span class="email-title">'+em.t+'</span>';
      h+='<span class="email-ch">'+em.ch+'</span></div>';
      if(isOpen){
        h+='<div class="email-body"><div class="email-meta">';
        h+='<div><div class="email-meta-label">Subject</div><div class="email-meta-val">'+em.sub+'</div></div>';
        h+='<div><div class="email-meta-label">From</div><div class="email-meta-val">'+em.from+'</div></div></div>';
        h+='<div class="email-copy-box"><div class="email-copy-label">Email copy</div><div class="email-copy">'+em.body.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
        if(em.sms){h+='<div class="sms-box"><div class="sms-label">SMS</div><div class="sms-copy">'+em.sms+'</div></div>';}
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}

function renderFuture(){
  let h='';
  // Hero
  h+='<div class="section" style="background:#0f172a;color:#fff;border:none"><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px">'+FV.hero.eyebrow+'</div>';
  h+='<h2 style="font-size:20px;font-weight:800;margin-bottom:6px">'+FV.hero.title+'</h2>';
  h+='<p style="font-size:12px;color:#94a3b8;line-height:1.6">'+FV.hero.subtitle+'</p>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px">';
  FV.netStats.forEach(s=>{
    h+='<div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#34d399">'+(s.after||'')+'</div>';
    h+='<div style="font-size:10px;color:#94a3b8">'+s.label+'</div>';
    if(s.sub)h+='<div style="font-size:9px;color:#64748b">'+s.sub+'</div>';
    h+='</div>';
  });
  h+='</div></div>';

  // Current problems
  h+='<div class="section"><h3>Current Journey Problems</h3>';
  FV.problems.forEach(p=>{
    h+='<div class="item" style="flex-direction:column;align-items:start;gap:4px;padding:10px"><strong style="font-size:13px">'+p.title+'</strong><span style="font-size:11px;color:#64748b;line-height:1.5">'+p.body+'</span></div>';
  });
  h+='</div>';

  // Before/After
  h+='<div class="section"><h3>What Changes</h3>';
  FV.fromTo.forEach(f=>{
    h+='<div class="fv-before-after"><div class="fv-before">'+f.before+'</div><div class="fv-arrow">&rarr;</div><div class="fv-after">'+f.after+'</div></div>';
  });
  h+='</div>';

  // 3-tier pod model
  h+='<div class="section"><h3>Three-Tier Pod Model</h3>';
  FV.suppTiers.forEach(s=>{
    h+='<div class="fv-card" style="margin-bottom:8px"><h3>'+s.tier+'</h3><div class="sub">'+s.what+'</div>';
    h+='<div style="font-size:11px;color:#64748b;line-height:1.5">'+s.why+'</div></div>';
  });
  h+='</div>';

  // Operational changes
  h+='<div class="section"><h3>Operational Changes</h3>';
  FV.ops.forEach(o=>{
    h+='<div style="padding:8px 0;border-bottom:1px solid #f1f5f9"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+o.title+'</div>';
    h+='<div style="font-size:11px;color:#64748b;line-height:1.5"><strong>Was:</strong> '+o.was+'</div>';
    h+='<div style="font-size:11px;color:#065f46;line-height:1.5"><strong>Now:</strong> '+o.now+'</div>';
    h+='<div style="font-size:10px;color:#94a3b8;margin-top:2px">Impact: '+o.impact+'</div></div>';
  });
  h+='</div>';

  // Build items
  h+='<div class="section"><h3>Build Items & Timeline</h3>';
  FV.buildItems.forEach(b=>{
    let pc=b.priority==='Critical'?'s-critical':b.priority==='High'?'s-high':'s-medium';
    h+='<div class="build-item"><span class="pill '+pc+'">'+b.priority+'</span><span class="bi-label">'+b.label+'</span><span class="bi-team">'+b.team+'</span><span class="bi-time">'+b.timeline+'</span></div>';
  });
  h+='</div>';

  // Trade-offs
  h+='<div class="section"><h3>Trade-offs & Risks</h3>';
  FV.tradeOffs.forEach(t=>{
    h+='<div style="padding:8px 0;border-bottom:1px solid #f1f5f9"><div style="font-size:12px;color:#991b1b;margin-bottom:4px"><strong>Risk:</strong> '+t.risk+'</div>';
    h+='<div style="font-size:11px;color:#065f46">'+t.mitigation+'</div></div>';
  });
  h+='</div>';

  return h;
}

function render(){
  renderNav();
  let c='';
  if(tab==='dashboard')c=renderDashboard();
  else if(tab==='comparison')c=renderComparison();
  else if(tab==='emails')c=renderEmails();
  else if(tab==='future')c=renderFuture();
  document.getElementById('content').innerHTML=c;
  if(editingNote){
    let el=document.querySelector('.note-input input');
    if(el)el.focus();
  }
}

render();
</script>
</body>
</html>
